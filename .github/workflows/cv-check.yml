name: CV Quality Check

on:
  push:
    branches:
      - main
      - dev
    paths:
      - cv-simon-delaigue-fr.pdf
      - index.html
      - VERSION
      - version.json
      - .github/workflows/cv-check.yml
  pull_request:
    branches:
      - main
    paths:
      - cv-simon-delaigue-fr.pdf
      - index.html
      - VERSION
      - version.json
      - .github/workflows/cv-check.yml

permissions:
  contents: read
env:
  cv_file: cv-simon-delaigue-fr.pdf

jobs:
  check-cv:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends exiftool poppler-utils

      - name: Check PDF exists
        run: |
          set -euo pipefail
          test -f "$cv_file"

      - name: Check PDF size
        run: |
          set -euo pipefail
          SIZE=$(stat -c%s "$cv_file")
          echo "PDF size: $SIZE bytes"
          if [ "$SIZE" -ge 2000000 ]; then
            echo "Error: PDF exceeds 2MB limit"
            exit 1
          fi

      - name: Extract PDF metadata
        run: |
          set -euo pipefail
          exiftool "$cv_file"

      - name: Check PDF pages
        run: |
          set -euo pipefail
          PAGES=$(pdfinfo "$cv_file" | awk '/^Pages:/ {print $2}')
          echo "PDF pages: $PAGES"
          test "$PAGES" -le 2

      - name: Generate version.json
        run: |
          set -euo pipefail
          TAG=$(git describe --tags --match "cv-*" --abbrev=0 2>/dev/null || echo "cv-dev")

          COMMIT=$(git rev-parse --short HEAD)

          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          BUILD=${{ github.run_number }}

          cat <<EOF > version.json
          {
            "cv_version": "$TAG",
            "commit": "$COMMIT",
            "published": "$DATE",
            "build": $BUILD
          }
          EOF

          cat version.json

      - name: Check HTML
        run: |
          set -euo pipefail
          test -f index.html
