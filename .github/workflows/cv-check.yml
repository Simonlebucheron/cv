name: CV Quality Check

on:
  push:
    branches:
      - main
      - dev
    paths:
      - cv-simon-delaigue-fr.pdf
      - index.html
      - VERSION
      - version.json
      - .github/workflows/*.yml
  pull_request:
    branches:
      - main
    paths:
      - cv-simon-delaigue-fr.pdf
      - index.html
      - VERSION
      - version.json
      - .github/workflows/*.yml

permissions:
  contents: read
env:
  CV_FILE: cv-simon-delaigue-fr.pdf

jobs:
  check-cv:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends exiftool poppler-utils

      - name: Check PDF exists
        run: |
          set -euo pipefail
          test -f "$CV_FILE"

      - name: Check PDF size
        run: |
          set -euo pipefail
          SIZE=$(stat -c%s "$CV_FILE")
          echo "PDF size: $SIZE bytes"
          if [ "$SIZE" -ge 2000000 ]; then
            echo "Error: PDF exceeds 2MB limit"
            exit 1
          fi

      - name: Extract PDF metadata
        run: |
          set -euo pipefail
          exiftool "$CV_FILE"

      - name: Check PDF pages
        run: |
          set -euo pipefail
          PAGES=$(pdfinfo "$CV_FILE" | awk '/^Pages:/ {print $2}')
          echo "PDF pages: $PAGES"
          test "$PAGES" -le 2

      - name: Check HTML
        run: |
          set -euo pipefail
          test -f index.html
