name: CV Quality Check

on:
  push:
    branches:
      - main
      - dev
      - feat/**
      - release/**
      - fix/**
    paths:
      - cv-simon-delaigue-fr.pdf
      - index.html
      - VERSION
      - .github/workflows/*.yml
  pull_request:
    branches:
      - main
      - dev
      - release/**
    paths:
      - cv-simon-delaigue-fr.pdf
      - index.html
      - VERSION
      - .github/workflows/*.yml

permissions:
  contents: read
env:
  CV_FILE: cv-simon-delaigue-fr.pdf

jobs:
  check-cv:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends exiftool poppler-utils

      - name: Check PDF exists
        run: |
          set -euo pipefail
          test -f "$CV_FILE"

      - name: Check PDF size
        run: |
          set -euo pipefail
          SIZE=$(stat -c%s "$CV_FILE")
          echo "PDF size: $SIZE bytes"
          if [ "$SIZE" -ge 2000000 ]; then
            echo "Error: PDF exceeds 2MB limit"
            exit 1
          fi

      - name: Extract PDF metadata
        run: |
          set -euo pipefail
          exiftool "$CV_FILE"

      - name: Check PDF pages
        run: |
          set -euo pipefail
          PAGES=$(pdfinfo "$CV_FILE" | awk '/^Pages:/ {print $2}')
          echo "PDF pages: $PAGES"
          test "$PAGES" -le 2

      - name: Check HTML
        run: |
          set -euo pipefail
          test -f index.html

      - name: Check VERSION format
        run: |
          set -euo pipefail
          VERSION_VALUE=$(tr -d '[:space:]' < VERSION)
          if ! [[ "$VERSION_VALUE" =~ ^cv-[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: VERSION must use format cv-x.y.z"
            exit 1
          fi

      - name: Check PDF version matches VERSION file
        run: |
          set -euo pipefail
          EXPECTED_VERSION=$(tr -d '[:space:]' < VERSION)
          TEXT_FILE=$(mktemp)
          NORMALIZED_FILE=$(mktemp)
          trap 'rm -f "$TEXT_FILE" "$NORMALIZED_FILE"' EXIT

          pdftotext "$CV_FILE" "$TEXT_FILE"
          tr -d '\r' < "$TEXT_FILE" > "$NORMALIZED_FILE"

          if ! grep -Fq "$EXPECTED_VERSION" "$NORMALIZED_FILE"; then
            echo "Error: PDF must include version $EXPECTED_VERSION"
            exit 1
          fi
