name: Deploy CV to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - cv-simon-delaigue-fr.pdf
      - index.html
      - VERSION
      - CNAME
      - .github/workflows/deploy.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate version.json for deployment
        run: |
          set -euo pipefail
          CV_VERSION=$(tr -d '[:space:]' < VERSION)
          SITE_VERSION="site-${GITHUB_RUN_NUMBER}"
          DEPLOY_DATE=$(date -u +"%Y-%m-%d")

          cat <<EOF > version.json
          {
            "cvVersion": "$CV_VERSION",
            "siteVersion": "$SITE_VERSION",
            "deployedAt": "$DEPLOY_DATE"
          }
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4