<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV - Simon Delaigue</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; }
        a { color: #0066cc; text-decoration: none; }
    </style>
</head>
<body>
    <h1>Simon Delaigue</h1>
    <p>Bienvenue sur mon CV en ligne.</p>
    <a href="cv-simon-delaigue-fr.pdf" download>Télécharger le CV (PDF)</a>

<p id="version"></p>

<script>
    fetch("version.json")
    .then(r => r.json())
    .then(v => {
      document.getElementById("version").innerHTML =
        "Version " + v.version + " - " + v.date;
    });
</script>
</html>
